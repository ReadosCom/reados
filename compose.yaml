name: reados

include:
  - ./config/compose/traefik.compose.yaml
  - ./config/compose/pgadmin.compose.yaml
  - ./config/compose/frontend.compose.yaml
  - ./config/compose/core.compose.yaml
  - ./config/compose/authentication.compose.yaml
  - ./config/compose/accounting.compose.yaml
  - ./config/compose/kafka.compose.yaml
