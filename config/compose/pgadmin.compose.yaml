services:
  pgadmin:
    image: dpage/pgadmin4:9.14.0
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reados.dev
      PGADMIN_DEFAULT_PASSWORD: ${READOS_PGADMIN_PASSWORD:?Set READOS_PGADMIN_PASSWORD in .env}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGPASS_FILE: /pgpassfile
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpassfile.local:/pgpassfile:ro
    networks:
      - reados
    depends_on:
      pgbouncer:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.docker.network: reados
      traefik.http.routers.pgadmin.rule: Host(`pgadmin.localhost`)
      traefik.http.routers.pgadmin.entrypoints: web
      traefik.http.services.pgadmin.loadbalancer.server.port: "80"
