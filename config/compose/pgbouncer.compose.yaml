services:
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.local.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "test -r /etc/pgbouncer/userlist.txt && nc -z 127.0.0.1 6432"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reados
    depends_on:
      postgres:
        condition: service_healthy
