[databases]
postgres = host=postgres port=5432 dbname=postgres
core = host=postgres port=5432 dbname=core
authentication = host=postgres port=5432 dbname=authentication
accounting = host=postgres port=5432 dbname=accounting
openfga = host=postgres port=5432 dbname=openfga pool_mode=session

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
ignore_startup_parameters = extra_float_digits
