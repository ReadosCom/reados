services:
  frontend:
    build:
      context: ../..
      dockerfile: ./config/compose/frontend.dockerfile
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ../..:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - reados
    labels:
      traefik.enable: "true"
      traefik.docker.network: reados
      traefik.http.routers.frontend.rule: HostRegexp(`^[a-z0-9-]+\.localhost$`) && PathPrefix(`/`)
      traefik.http.routers.frontend.entrypoints: web
      traefik.http.routers.frontend.priority: "1"
      traefik.http.services.frontend.loadbalancer.server.port: "5173"
